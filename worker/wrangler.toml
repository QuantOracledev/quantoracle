name = "quantoracle"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
BACKEND_URL = "http://backend.quantoracle.dev:8001"
FREE_DAILY_LIMIT = "1000"
WALLET_ADDRESS = "0xC94f5F33ae446a50Ce31157db81253BfddFE2af6"
SOLANA_WALLET_ADDRESS = "9biztrXscReJ3Wi8EfkD2gL3WXzYUmzTEohD26Bxp39u"
# Replace with your actual values after deploy

# KV namespace for rate limiting (1000 free calls/IP/day)
# Create with: npx wrangler kv namespace create RATE_LIMITS
# Then paste the binding ID below
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "a3999e7ed36249508ea1c0ac9c79ad31"

# NOTE: the native Workers rate-limit binding ([[unsafe.bindings]] type=ratelimit)
# was tried here 2026-07-09 but is INERT on this account — .limit() returned
# success for 480/480 sustained requests in a load test. Burst protection lives
# in a Cloudflare WAF rate-limiting rule instead (edge-enforced, before the Worker).

# Custom domain routing
# After deploy, add custom domain in Cloudflare dashboard:
# Workers & Pages > quantoracle > Settings > Domains & Routes
# Add: api.quantoracle.dev
