startCommand:
  type: http
  configSchema:
    type: object
    required: []
    properties:
      daily_limit:
        type: integer
        default: 1000
        description: "Free tier daily call limit per IP. Default is 1000 calls/day. No signup required."
      backend_url:
        type: string
        default: "https://api.quantoracle.dev"
        description: "QuantOracle REST API base URL. Override to use a self-hosted instance."
    additionalProperties: false
    description: "QuantOracle requires no configuration. 79 tools: 63 calculators + 10 composites + batch + a live market-data tier (real-time crypto volatility & perp funding) + QuantOracle Watch (24/7 position monitoring, $5/30d via x402, free 48h trial). Free tier: 1000 calls/IP/day (live tier: 20 free/day)."
  url: "https://mcp.quantoracle.dev/mcp"
